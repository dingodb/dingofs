name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-release

  docker-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker data-root
        run: |
          sudo systemctl stop docker
          sudo systemctl stop docker.socket
          sudo mkdir -p /mnt/docker
          echo '{ "data-root": "/mnt/docker" }' | sudo tee /etc/docker/daemon.json
          if [ -d /var/lib/docker ]; then
            sudo mv /var/lib/docker /mnt/docker || true
          fi
          sudo systemctl start docker.socket
          sudo systemctl start docker
          docker info | grep "Docker Root Dir"

      - name: Download dingofs artifact (from same run)
        uses: actions/download-artifact@v4
        with:
          name: dingofs

      - name: Extract artifact
        run: tar -xzvf dingofs.tar.gz -C scripts/docker/rocky9 && rm -f dingofs.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: dingodatabase/dingofs
          tags: |
            type=raw,enable=${{ startsWith(github.ref, 'refs/tags/') }},value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push dingofs image
        uses: docker/build-push-action@v6
        with:
          context: ./scripts/docker/rocky9
          file: ./scripts/docker/rocky9/Dockerfile
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}

  wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19.1
        env:
          CIBW_BUILD_FRONTEND: build
      - uses: actions/upload-artifact@v4
        with:
          name: dingofs_whl
          path: ./wheelhouse/*.whl

  pypi-publish:
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifact (from same run)
        uses: actions/download-artifact@v4
        with:
          name: dingofs_whl
      - name: Install Twine
        run: |
          pip install twine
          pip install --upgrade --force-reinstall "packaging>=24.2"
      - name: Upload package to PyPI
        run: twine upload *.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
